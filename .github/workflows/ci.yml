name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt-clippy:
    name: fmt + clippy (no QNN SDK)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy (default-members only)
        run: cargo clippy --workspace --exclude qnn --exclude qnn-sys -- -D warnings

  build-default:
    name: build (default-members, x64 host, no SDK)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build
        run: cargo build --workspace --exclude qnn --exclude qnn-sys

  test-default:
    name: test (default-members)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --workspace --exclude qnn --exclude qnn-sys

  python-lint:
    name: npu-convert lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install ruff
        run: pip install ruff
      - name: ruff check
        working-directory: python/npu-convert
        run: ruff check .

  python-test:
    name: npu-convert tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install npu-convert + test deps
        working-directory: python/npu-convert
        run: pip install -e ".[test]"
      - name: pytest
        working-directory: python/npu-convert
        run: pytest -v

  winget-validate:
    name: winget manifest validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate every published manifest dir
        shell: pwsh
        run: |
          $manifestRoot = "manifests/b/bpbonker/npurun"
          if (-not (Test-Path $manifestRoot)) {
            Write-Host "no winget manifests yet, skipping" -ForegroundColor Yellow
            exit 0
          }
          $failed = 0
          Get-ChildItem -Path $manifestRoot -Directory | ForEach-Object {
            Write-Host "validating $($_.FullName)" -ForegroundColor Cyan
            & winget validate --manifest $_.FullName
            if ($LASTEXITCODE -ne 0) { $failed++ }
          }
          if ($failed -gt 0) {
            Write-Error "$failed manifest version(s) failed validation"
            exit 1
          }

  # Self-hosted ARM64 runner with the QNN SDK pre-installed runs the full
  # build + NPU integration tests. Wire up once the dev laptop is enrolled
  # as a self-hosted runner.
  build-arm64-with-qnn:
    name: build aarch64-pc-windows-msvc (full, requires QNN SDK)
    runs-on: [self-hosted, Windows, ARM64]
    if: false # enable once self-hosted runner is configured
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: cargo build (full workspace)
        env:
          QNN_SDK_ROOT: ${{ secrets.QNN_SDK_ROOT }}
        run: cargo build --workspace --target aarch64-pc-windows-msvc
