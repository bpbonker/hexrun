ShortDescription: NPU-first local LLM runtime for Snapdragon X Elite (Windows on ARM)
Description: |-
  npurun runs large language models on the Hexagon NPU built into
  Snapdragon X Elite laptops. Native Rust on top of Qualcomm's Genie LLM
  runtime; an Ollama-class CLI and an OpenAI/Ollama-compatible HTTP
  server. Today the rest of the open-source LLM stack (Ollama,
  llama.cpp, LM Studio, text-generation-webui) runs CPU-only on these
  laptops; npurun makes the 45 TOPS NPU usable.

  Phi 3.5 Mini (w4a16) sustains ~11.7 tokens/sec on the X1E NPU at
  ~1.27 J/token, roughly 2-3x more energy-efficient per token than
  llama.cpp on the same laptop's CPU. The OpenAI-compatible HTTP
  server (default port 11435) works with Open WebUI and any
  OpenAI-API client.

  Requires Qualcomm's QAIRT 2.44 or 2.45 SDK installed separately
  (the SDK is non-redistributable, so this package does not include
  it). Download from the Qualcomm developer portal and set
  QNN_SDK_ROOT before running. The bundled scripts/setup-qnn.ps1
  validates the install.
