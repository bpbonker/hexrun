ReleaseNotes: |-
  First public release candidate. Verified on Snapdragon X Elite
  (X1E80100), Windows 11 ARM64, QAIRT 2.45.

  - Phi 3.5 Mini (w4a16, NPU): ~11.7 tok/s, ~194 ms TTFT, ~1.27 J/token
  - HTTP server: OpenAI + Ollama compat, SSE/NDJSON streaming,
    bearer-token auth, HTTP 429 backpressure, graceful shutdown
  - Multi-turn chat via Genie KV-cache prefix matching

  See the GitHub release page for full notes.
